<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biosimilar ASP Monitor — Samsung Bioepis</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #F0F4F8; color: #1a1a1a; }
  .header { background: #003087; color: white; padding: 18px 32px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
  .header h1 { font-size: 18px; font-weight: 700; }
  .header .sub { font-size: 12px; opacity: .75; margin-top: 3px; }
  .last-updated { font-size: 11px; opacity: .7; text-align: right; }
  .filter-bar { background: white; padding: 14px 32px; display: flex; gap: 16px; align-items: center; flex-wrap: wrap; border-bottom: 1px solid #E0E0E0; box-shadow: 0 2px 4px rgba(0,0,0,.06); }
  .filter-bar label { font-size: 12px; font-weight: 600; color: #555; }
  .filter-bar select { padding: 6px 12px; border: 1px solid #D0D0D0; border-radius: 6px; font-size: 13px; background: white; cursor: pointer; }
  .badge-sb { background: #1565C0; color: white; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 700; }
  .badge-verify { background: #546E7A; color: white; padding: 2px 8px; border-radius: 10px; font-size: 10px; }
  .dl-btn { margin-left: auto; background: #1B5E20; color: white; border: none; padding: 8px 16px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; }
  .dl-btn:hover { background: #2E7D32; }
  .main { padding: 24px 32px; max-width: 1400px; margin: 0 auto; }
  .card { background: white; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,.08); margin-bottom: 28px; overflow: hidden; }
  .card-header { padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; }
  .card-header h2 { font-size: 15px; font-weight: 700; color: white; }
  .card-header .meta { font-size: 11px; color: rgba(255,255,255,.8); margin-top: 2px; }
  .mol-dl-btn { background: rgba(255,255,255,.2); color: white; border: 1px solid rgba(255,255,255,.4); padding: 5px 12px; border-radius: 5px; font-size: 11px; cursor: pointer; font-weight: 600; }
  .mol-dl-btn:hover { background: rgba(255,255,255,.35); }
  .tbl-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  thead tr { background: #F0F4FA; }
  th { padding: 10px 14px; text-align: right; font-weight: 600; color: #444; border-bottom: 2px solid #E0E0E0; white-space: nowrap; font-size: 11px; }
  th:first-child { text-align: left; min-width: 200px; }
  td { padding: 9px 14px; text-align: right; border-bottom: 1px solid #F0F0F0; vertical-align: middle; }
  td:first-child { text-align: left; }
  tr:last-child td { border-bottom: none; }
  .row-orig { background: #FFF3F3; }
  .row-sb { background: #E3F0FF; }
  .row-other { background: white; }
  .row-other:nth-child(even) { background: #FAFAFA; }
  .brand-cell { display: flex; flex-direction: column; }
  .brand-name { font-weight: 600; font-size: 12px; }
  .brand-suffix { font-size: 10px; color: #888; margin-top: 1px; }
  .brand-co { font-size: 10px; color: #999; }
  .tag-orig { background: #C62828; color: white; padding: 1px 6px; border-radius: 3px; font-size: 9px; font-weight: 700; display: inline-block; margin-left: 5px; }
  .tag-sb { background: #1565C0; color: white; padding: 1px 6px; border-radius: 3px; font-size: 9px; font-weight: 700; display: inline-block; margin-left: 5px; }
  .asp-val { font-weight: 700; font-size: 13px; }
  .asp-orig { color: #C62828; }
  .asp-sb { color: #1565C0; }
  .asp-other { color: #333; }
  .asp-na { color: #CCC; font-weight: 400; }
  .ira-badge { background: #F3E5F5; color: #6A1B9A; padding: 1px 5px; border-radius: 3px; font-size: 9px; font-weight: 700; display: inline-block; margin-left: 4px; }
  .chg-up { color: #C62828; font-size: 10px; }
  .chg-dn { color: #1565C0; font-size: 10px; }
  .chart-wrap { padding: 20px 24px 16px; }
  .chart-wrap canvas { max-height: 320px; }
  .loading { text-align: center; padding: 60px; color: #888; font-size: 14px; }
  .error { text-align: center; padding: 40px; color: #C62828; font-size: 13px; }
  .legend-bar { padding: 10px 20px; background: #F8F9FA; border-top: 1px solid #EEE; font-size: 11px; color: #666; display: flex; gap: 20px; flex-wrap: wrap; }
  .leg-item { display: flex; align-items: center; gap: 5px; }
  .leg-dot { width: 10px; height: 10px; border-radius: 50%; }
</style>
</head>
<body>
<div class="header">
  <div>
    <h1>Biosimilar ASP Monitor — Samsung Bioepis</h1>
    <div class="sub">CMS Medicare Part B | ASP 역산 + IRA qualifying 자동 검증</div>
  </div>
  <div class="last-updated" id="lastUpdated">데이터 로딩 중...</div>
</div>
<div class="filter-bar">
  <label>Molecule</label>
  <select id="molSelect" onchange="renderAll()">
    <option value="ALL">전체 보기</option>
  </select>
  <label>분기 수</label>
  <select id="qSelect" onchange="renderAll()">
    <option value="8">최근 8분기</option>
    <option value="12">최근 12분기</option>
    <option value="ALL">전체</option>
  </select>
  <span class="badge-sb">★ SB</span> Samsung Bioepis 제품
  <span class="badge-verify">검증용</span> 시장 검증 molecule
  <button class="dl-btn" onclick="downloadAllExcel()">⬇ 전체 Excel 다운로드</button>
</div>
<div class="main" id="mainContent">
  <div class="loading">⏳ 데이터 로딩 중...</div>
</div>

<script>
const SB_MOLECULES = ["Infliximab","Ranibizumab","Trastuzumab","Denosumab"];
const CLINICAL_UNIT = {
  "Infliximab":"100mg/vial","Ranibizumab":"0.5mg/inj",
  "Trastuzumab":"420mg/vial","Denosumab":"120mg/vial",
  "Bevacizumab":"400mg/vial","Rituximab":"500mg/vial",
  "Filgrastim":"300mcg/vial","Pegfilgrastim":"6mg/syringe",
  "Epoetin alfa":"40,000u/vial","Tocilizumab":"400mg/vial"
};
const CLR_ORIG  = "#C62828";
const CLR_SB    = "#1565C0";
const CLR_OTHER = ["#607D8B","#78909C","#90A4AE","#546E7A","#455A64","#37474F","#B0BEC5"];

let globalData = {};
let chartInst  = {};

// ── CSV 파싱 (따옴표 처리 포함) ───────────────────────────
function parseCSVLine(line) {
  const result = [];
  let cur = "", inQuote = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') {
      inQuote = !inQuote;
    } else if (ch === ',' && !inQuote) {
      result.push(cur.trim());
      cur = "";
    } else {
      cur += ch;
    }
  }
  result.push(cur.trim());
  return result;
}

async function loadData() {
  try {
    const res = await fetch("data/asp_data.csv?t=" + Date.now());
    if (!res.ok) throw new Error("CSV 파일 없음");
    const text = await res.text();
    parseCSV(text);
    populateMolSelect();
    renderAll();
  } catch(e) {
    document.getElementById("mainContent").innerHTML =
      `<div class="error">❌ 데이터 로드 실패: ${e.message}<br>GitHub Actions를 먼저 실행해 data/asp_data.csv를 생성하세요.</div>`;
  }
}

function parseCSV(text) {
  const lines = text.trim().split("\n");
  const headers = parseCSVLine(lines[0]);

  document.getElementById("lastUpdated").textContent =
    "최종 업데이트: " + new Date().toLocaleDateString("ko-KR");

  globalData = {};

  for (let li = 1; li < lines.length; li++) {
    const vals = parseCSVLine(lines[li]);
    if (vals.length < 5) continue;

    const row = {};
    headers.forEach((h, i) => { row[h] = (vals[i] || "").replace(/^"|"$/g, "").trim(); });

    const mol   = row["molecule"];
    const brand = row["brand"];
    const qtr   = row["quarter"];
    if (!mol || !brand || !qtr) continue;

    if (!globalData[mol]) globalData[mol] = { quarters: new Set(), products: {} };
    globalData[mol].quarters.add(qtr);

    if (!globalData[mol].products[brand]) {
      globalData[mol].products[brand] = {
        brand, company: row["company"],
        suffix: row["hcpcs_code"] || row["suffix"] || "",
        is_sb:  row["is_sb"]   === "True",
        is_orig:row["is_orig"] === "True",
        data: {}
      };
    }

    // asp 컬럼 = 이미 임상단위 환산된 값
    const aspVal = parseFloat(row["asp"]);
    globalData[mol].products[brand].data[qtr] = {
      asp:   isNaN(aspVal) ? null : aspVal,
      addon: parseInt(row["addon_pct"]) || 6,
      ira:   row["ira_qualifying"] === "True" || row["ira"] === "True",
    };
  }

  // 분기 정렬
  const qorder = {"Q1 (Jan)":1,"Q2 (Apr)":2,"Q3 (Jul)":3,"Q4 (Oct)":4};
  Object.values(globalData).forEach(m => {
    m.quarters = Array.from(m.quarters).sort((a, b) => {
      const parse = s => {
        const parts = s.split(" ");
        const yr  = parseInt(parts[0]) || 0;
        const qp  = parts.slice(1).join(" ");
        return yr * 10 + (qorder[qp] || 0);
      };
      return parse(a) - parse(b);
    });
  });
}

function populateMolSelect() {
  const sel = document.getElementById("molSelect");
  sel.innerHTML = '<option value="ALL">전체 보기</option>';
  SB_MOLECULES.forEach(m => {
    if (globalData[m]) sel.innerHTML += `<option value="${m}">★ ${m}</option>`;
  });
  Object.keys(globalData).forEach(m => {
    if (!SB_MOLECULES.includes(m))
      sel.innerHTML += `<option value="${m}">${m}</option>`;
  });
}

function getFilteredQuarters(mol) {
  const qSel = document.getElementById("qSelect").value;
  const md   = globalData[mol];
  return qSel === "ALL" ? md.quarters : md.quarters.slice(-parseInt(qSel));
}

function renderAll() {
  const molSel = document.getElementById("molSelect").value;
  const mols   = molSel === "ALL" ? Object.keys(globalData) : [molSel];
  Object.values(chartInst).forEach(c => c.destroy());
  chartInst = {};
  const container = document.getElementById("mainContent");
  container.innerHTML = "";
  mols.forEach(mol => {
    if (!globalData[mol]) return;
    const quarters = getFilteredQuarters(mol);
    const hasSb    = SB_MOLECULES.includes(mol);
    container.appendChild(buildCard(mol, globalData[mol], quarters, hasSb));
  });
}

function getOrdered(md) {
  const prods   = Object.values(md.products);
  const origP   = prods.find(p => p.is_orig);
  const sbPs    = prods.filter(p => p.is_sb && !p.is_orig);
  const otherPs = prods.filter(p => !p.is_orig && !p.is_sb);
  return [origP, ...sbPs, ...otherPs].filter(Boolean);
}

function buildCard(mol, md, quarters, hasSb) {
  const unit   = CLINICAL_UNIT[mol] || "per unit";
  const hdrBg  = hasSb ? "#003087" : "#37474F";
  const ordered = getOrdered(md);
  const card = document.createElement("div");
  card.className = "card";
  card.innerHTML = `
    <div class="card-header" style="background:${hdrBg}">
      <div>
        <h2>${mol} ${hasSb
          ? '<span style="background:rgba(255,255,255,.2);padding:1px 7px;border-radius:3px;font-size:10px;">★ Samsung Bioepis</span>'
          : '<span style="background:rgba(255,255,255,.15);padding:1px 7px;border-radius:3px;font-size:10px;">시장 검증용</span>'}</h2>
        <div class="meta">기준: ${unit} &nbsp;|&nbsp; ${quarters.length}개 분기 표시</div>
      </div>
      <button class="mol-dl-btn" onclick="downloadMolExcel('${mol}')">⬇ Excel</button>
    </div>
    <div class="card-body">
      <div class="tbl-wrap">${buildTable(ordered, quarters)}</div>
      <div class="legend-bar">
        <span class="leg-item"><span class="leg-dot" style="background:#C62828"></span>Originator</span>
        <span class="leg-item"><span class="leg-dot" style="background:#1565C0"></span>Samsung Bioepis</span>
        <span class="leg-item"><span class="leg-dot" style="background:#607D8B"></span>기타 Biosimilar</span>
        <span style="margin-left:auto;color:#6A1B9A;font-weight:600;">★IRA = IRA qualifying (+8% add-on)</span>
      </div>
      <div class="chart-wrap"><canvas id="chart_${mol.replace(/ /g,'_').replace(/\//g,'_')}"></canvas></div>
    </div>`;
  setTimeout(() => buildChart(mol, ordered, quarters), 50);
  return card;
}

function buildTable(prods, quarters) {
  const qHeaders = quarters.map(q =>
    `<th>${q.replace(/ \(.*\)/,"")}</th>`
  ).join("");
  const rows = prods.map(p => {
    const rowClass = p.is_orig ? "row-orig" : (p.is_sb ? "row-sb" : "row-other");
    const tag = p.is_orig
      ? '<span class="tag-orig">Originator</span>'
      : (p.is_sb ? '<span class="tag-sb">★ SB</span>' : "");
    let prevAsp = null;
    const cells = quarters.map(q => {
      const d = p.data[q];
      if (!d || d.asp === null) return `<td><span class="asp-na">—</span></td>`;
      const aspClass = p.is_orig ? "asp-orig" : (p.is_sb ? "asp-sb" : "asp-other");
      const iraBadge = d.ira
        ? '<span class="ira-badge">+8%IRA</span>'
        : '<span style="font-size:9px;color:#bbb;">+6%</span>';
      let chg = "";
      if (prevAsp !== null) {
        const pct = (d.asp - prevAsp) / prevAsp * 100;
        if (pct > 0.5)       chg = `<span class="chg-up">▲${pct.toFixed(1)}%</span>`;
        else if (pct < -0.5) chg = `<span class="chg-dn">▼${Math.abs(pct).toFixed(1)}%</span>`;
      }
      prevAsp = d.asp;
      return `<td>
        <span class="asp-val ${aspClass}">$${d.asp.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2})}</span>
        ${iraBadge} ${chg}
      </td>`;
    }).join("");
    return `<tr class="${rowClass}">
      <td><div class="brand-cell">
        <span class="brand-name">${p.brand}${tag}</span>
        <span class="brand-suffix">${p.suffix}</span>
        <span class="brand-co">${p.company}</span>
      </div></td>${cells}
    </tr>`;
  }).join("");
  return `<table>
    <thead><tr><th>Brand / HCPCS / Company</th>${qHeaders}</tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function buildChart(mol, prods, quarters) {
  const canvasId = `chart_${mol.replace(/ /g,'_').replace(/\//g,'_')}`;
  const canvas   = document.getElementById(canvasId);
  if (!canvas) return;
  let otherIdx = 0;
  const datasets = prods.map(p => {
    let color;
    if (p.is_orig)    color = CLR_ORIG;
    else if (p.is_sb) color = CLR_SB;
    else              color = CLR_OTHER[otherIdx++ % CLR_OTHER.length];
    return {
      label: p.brand,
      data:  quarters.map(q => p.data[q]?.asp ?? null),
      borderColor: color,
      backgroundColor: color + "22",
      borderWidth: p.is_orig ? 3 : (p.is_sb ? 2.5 : 1.5),
      borderDash: p.is_orig ? [] : (p.is_sb ? [6,3] : [3,3]),
      pointRadius: p.is_orig ? 5 : (p.is_sb ? 4 : 3),
      tension: 0.3,
      spanGaps: true,
    };
  });
  chartInst[mol] = new Chart(canvas, {
    type: "line",
    data: { labels: quarters.map(q => q.replace(/ \(.*\)/,"")), datasets },
    options: {
      responsive: true,
      plugins: {
        legend: { position: "bottom", labels: { font:{size:10}, boxWidth:14, padding:12 } },
        tooltip: {
          callbacks: {
            label: ctx => `${ctx.dataset.label}: $${ctx.parsed.y?.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2}) ?? "N/A"}`
          }
        }
      },
      scales: {
        x: { ticks: { font:{size:9}, maxRotation:30 }, grid: { display:false } },
        y: { ticks: { font:{size:9}, callback: v => "$"+v.toLocaleString("en-US") }, grid: { color:"#F0F0F0" } }
      }
    }
  });
}

// ── Excel 다운로드 ────────────────────────────────────────
function buildSheetData(mol) {
  const quarters = getFilteredQuarters(mol);
  const ordered  = getOrdered(globalData[mol]);
  const unit     = CLINICAL_UNIT[mol] || "per unit";
  const header   = ["Brand","Type","Company","HCPCS",
                    ...quarters.map(q => q.replace(/ \(.*\)/,""))];
  const rows = [header];
  ordered.forEach(p => {
    const type = p.is_orig ? "Originator" : (p.is_sb ? "Samsung Bioepis" : "Biosimilar");
    rows.push([p.brand, type, p.company, p.suffix,
               ...quarters.map(q => p.data[q]?.asp ?? "")]);
  });
  rows.push([]);
  rows.push(["Unit", unit]);
  rows.push(["Generated", new Date().toLocaleString("ko-KR")]);
  rows.push(["Source", "CMS Medicare Part B ASP Pricing Files"]);
  return rows;
}

function downloadMolExcel(mol) {
  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet(buildSheetData(mol));
  ws['!cols'] = [{wch:22},{wch:16},{wch:20},{wch:12},...Array(50).fill({wch:13})];
  XLSX.utils.book_append_sheet(wb, ws, mol.slice(0,31));
  XLSX.writeFile(wb, `ASP_${mol.replace(/ /g,"_")}_${new Date().toISOString().slice(0,10)}.xlsx`);
}

function downloadAllExcel() {
  const molSel = document.getElementById("molSelect").value;
  const mols   = molSel === "ALL" ? Object.keys(globalData) : [molSel];
  const wb     = XLSX.utils.book_new();

  // 요약 시트
  const summaryRows = [["Molecule","Brand","Type","Company","Latest ASP","Quarter","IRA"]];
  mols.forEach(mol => {
    const quarters = getFilteredQuarters(mol);
    const lastQ    = quarters[quarters.length - 1];
    getOrdered(globalData[mol]).forEach(p => {
      const d    = p.data[lastQ];
      const type = p.is_orig ? "Originator" : (p.is_sb ? "Samsung Bioepis" : "Biosimilar");
      summaryRows.push([
        mol, p.brand, type, p.company,
        d?.asp ?? "",
        lastQ ? lastQ.replace(/ \(.*\)/,"") : "",
        d?.ira ? "+8% IRA" : "+6%"
      ]);
    });
  });
  const sumWs = XLSX.utils.aoa_to_sheet(summaryRows);
  sumWs['!cols'] = [{wch:16},{wch:22},{wch:16},{wch:20},{wch:12},{wch:12},{wch:10}];
  XLSX.utils.book_append_sheet(wb, sumWs, "Summary");

  mols.forEach(mol => {
    const ws = XLSX.utils.aoa_to_sheet(buildSheetData(mol));
    ws['!cols'] = [{wch:22},{wch:16},{wch:20},{wch:12},...Array(50).fill({wch:13})];
    XLSX.utils.book_append_sheet(wb, ws, mol.slice(0,31));
  });

  XLSX.writeFile(wb, `Biosimilar_ASP_Report_${new Date().toISOString().slice(0,10)}.xlsx`);
}

loadData();
</script>

</body>
</html>
